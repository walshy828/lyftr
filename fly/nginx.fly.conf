server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json image/svg+xml;

    # API — proxy to local Go backend
    location /api/ {
        proxy_pass         http://localhost:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Must stay above the backend's longest internal AI-provider timeout
        # (currently 60s, see backend/controllers/programs.go and food.go).
        proxy_read_timeout 75s;
    }

    # Health check passthrough
    location /health {
        proxy_pass http://localhost:3000/health;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Service worker must always be revalidated — never cached — so
    # clients pick up new deployments immediately.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
