version: '3.8'

services:
  backend:
    image: cwlumm/lyftr-backend:latest
    build: ./backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      # Controls Gin's debug/release mode and demo-data seeding (see backend/config/config.go).
      # Defaults to production for self-host deployments; override in .env only for local debugging.
      - ENV=${ENV:-production}
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
      - DB_TYPE=sqlite
      - DB_PATH=/app/data/lyftr.db
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: cwlumm/lyftr-frontend:latest
    build: ./web
    restart: unless-stopped
    environment:
      # host:port the frontend nginx proxies /api to. Must match the backend's PORT.
      - BACKEND_ORIGIN=${BACKEND_ORIGIN:-backend:3000}
    ports:
      - "${PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
